<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}World Cup Predictor{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        .sidebar-active {
            background-color: #1e40af;
            color: white;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">

    <!-- Barre latérale -->
    <div class="w-72 bg-gradient-to-b from-blue-900 to-blue-950 text-white flex flex-col">
        <div class="p-6 border-b border-blue-800">
            <div class="flex items-center gap-3">
                <i class="fas fa-trophy text-3xl text-yellow-400"></i>
                <div>
                    <h1 class="text-2xl font-bold">CM Predictor</h1>
                    <p class="text-blue-300 text-sm">Coupe du Monde 2026</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-1">
    <a href="{% url 'predictions:dashboard_favoris' %}" 
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-blue-800 transition-colors {% if request.resolver_match.url_name == 'dashboard_favoris' %}sidebar-active{% endif %}">
        <i class="fas fa-home w-5"></i>
        <span>Dashboard & Favoris</span>
    </a>
    
    <a href="{% url 'predictions:match_predictor' %}" 
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-blue-800 transition-colors {% if request.resolver_match.url_name == 'match_predictor' %}sidebar-active{% endif %}">
        <i class="fas fa-bolt w-5"></i>
        <span>Confrontation</span>
    </a>
    
    <a href="{% url 'predictions:page_scenarios' %}" 
       class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-blue-800 transition-colors {% if request.resolver_match.url_name == 'page_scenarios' %}sidebar-active{% endif %}">
        <i class="fas fa-flask w-5"></i>
        <span>Simulateur Scénarios</span>
    </a>
</nav>
            

    </div>

    <!-- Contenu principal -->
    <div class="flex-1 flex flex-col overflow-auto">
        <header class="bg-white border-b px-8 py-5">
            <h2 class="text-3xl font-semibold text-gray-800">{% block page_title %}Dashboard{% endblock %}</h2>
        </header>

        <main class="flex-1 p-8">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</div>

</body>
</html>
